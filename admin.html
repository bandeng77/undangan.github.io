<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Data RSVP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f9;
            color: #333;
        }

        .navbar {
            background: linear-gradient(135deg, #2c3e50 0%, #1e2b37 100%);
            color: white;
            padding: 20px 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .navbar h1 {
            font-weight: 300;
            font-size: 1.8rem;
        }

        .navbar h1 i {
            color: #e67e22;
            margin-right: 10px;
        }

        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-item .label {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .stat-item .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e67e22;
        }

        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .actions {
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #e67e22;
            color: white;
        }

        .btn-primary:hover {
            background: #c96b1c;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(230, 126, 34, 0.3);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        .search-box {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #e67e22;
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.1);
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 8px 20px;
            border-radius: 30px;
            background: white;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .filter-tab:hover {
            border-color: #e67e22;
            color: #e67e22;
        }

        .filter-tab.active {
            background: #e67e22;
            border-color: #e67e22;
            color: white;
        }

        .table-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }

        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #2c3e50;
            border-bottom: 2px solid #e0e0e0;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .attendance-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .badge-hadir {
            background: #d4edda;
            color: #155724;
        }

        .badge-tidak {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-ragu {
            background: #fff3cd;
            color: #856404;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-size: 0.9rem;
        }

        .btn-view {
            background: #17a2b8;
        }

        .btn-view:hover {
            background: #138496;
        }

        .btn-delete {
            background: #dc3545;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 1.2rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-weight: 400;
            color: #2c3e50;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }

        .modal-close:hover {
            color: #e67e22;
        }

        .modal-body {
            padding: 20px;
        }

        .detail-item {
            margin-bottom: 15px;
        }

        .detail-item strong {
            display: block;
            margin-bottom: 5px;
            color: #2c3e50;
        }

        .detail-item p {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            color: #555;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 20px;
            }
            
            .navbar h1 {
                font-size: 1.4rem;
            }
            
            .stats {
                width: 100%;
            }
            
            .stat-item {
                flex: 1;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <h1>
            <i class="fas fa-cog"></i> Admin Panel - Data RSVP
        </h1>
        <div class="stats">
            <div class="stat-item">
                <div class="label">Total</div>
                <div class="value" id="totalCount">0</div>
            </div>
            <div class="stat-item">
                <div class="label">Hadir</div>
                <div class="value" id="hadirCount">0</div>
            </div>
            <div class="stat-item">
                <div class="label">Tidak Hadir</div>
                <div class="value" id="tidakCount">0</div>
            </div>
            <div class="stat-item">
                <div class="label">Ragu</div>
                <div class="value" id="raguCount">0</div>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Actions -->
        <div class="actions">
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn btn-success" onclick="exportToXLS()">
                    <i class="fas fa-file-excel"></i> Export XLS
                </button>
                <button class="btn btn-danger" onclick="clearAllData()">
                    <i class="fas fa-trash"></i> Hapus Semua
                </button>
                <a href="index.html" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Kembali ke Undangan
                </a>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Cari nama, email, perusahaan, atau telepon..." onkeyup="filterData()">
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <div class="filter-tab active" onclick="filterByStatus('all')" id="filterAll">Semua</div>
            <div class="filter-tab" onclick="filterByStatus('Hadir')" id="filterHadir">Hadir</div>
            <div class="filter-tab" onclick="filterByStatus('Tidak Hadir')" id="filterTidak">Tidak Hadir</div>
            <div class="filter-tab" onclick="filterByStatus('Ragu')" id="filterRagu">Ragu</div>
        </div>

        <!-- Table -->
        <div class="table-container">
            <table id="rsvpTable">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Email</th>
                        <th>Perusahaan</th>
                        <th>Telepon</th>
                        <th>Kehadiran</th>
                        <th>Jumlah Tamu</th>
                        <th>Pesan</th>
                        <th>Waktu Daftar</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="10" class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>Belum ada data RSVP</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Detail -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-user"></i> Detail RSVP</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Detail will be filled dynamically -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        let currentData = [];
        let currentFilter = 'all';
        let currentSearch = '';

        // Load data from localStorage
        function loadData() {
            const rsvps = JSON.parse(localStorage.getItem('rsvps') || '[]');
            currentData = rsvps.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            updateStats();
            filterData();
        }

        // Update statistics
        function updateStats() {
            const total = currentData.length;
            const hadir = currentData.filter(item => item.attendance === 'Hadir').length;
            const tidak = currentData.filter(item => item.attendance === 'Tidak Hadir').length;
            const ragu = currentData.filter(item => item.attendance === 'Ragu').length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('hadirCount').textContent = hadir;
            document.getElementById('tidakCount').textContent = tidak;
            document.getElementById('raguCount').textContent = ragu;
        }

        // Filter data based on search and status
        function filterData() {
            let filtered = currentData;

            // Apply status filter
            if (currentFilter !== 'all') {
                filtered = filtered.filter(item => item.attendance === currentFilter);
            }

            // Apply search filter
            if (currentSearch) {
                const searchLower = currentSearch.toLowerCase();
                filtered = filtered.filter(item => 
                    (item.name && item.name.toLowerCase().includes(searchLower)) ||
                    (item.email && item.email.toLowerCase().includes(searchLower)) ||
                    (item.company && item.company.toLowerCase().includes(searchLower)) ||
                    (item.phone && item.phone.toLowerCase().includes(searchLower))
                );
            }

            renderTable(filtered);
            updateActiveFilterTab();
        }

        // Render table with data
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            
            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10" class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>Tidak ada data yang ditemukan</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = data.map((item, index) => {
                const attendanceClass = {
                    'Hadir': 'badge-hadir',
                    'Tidak Hadir': 'badge-tidak',
                    'Ragu': 'badge-ragu'
                }[item.attendance] || '';

                const date = new Date(item.timestamp).toLocaleString('id-ID', {
                    dateStyle: 'medium',
                    timeStyle: 'short'
                });

                // Truncate message if too long
                const message = item.message ? 
                    (item.message.length > 30 ? item.message.substring(0, 30) + '...' : item.message) : 
                    '-';

                return `
                    <tr>
                        <td>${index + 1}</td>
                        <td><strong>${escapeHtml(item.name) || '-'}</strong></td>
                        <td>${escapeHtml(item.email) || '-'}</td>
                        <td>${escapeHtml(item.company) || '-'}</td>
                        <td>${escapeHtml(item.phone) || '-'}</td>
                        <td>
                            <span class="attendance-badge ${attendanceClass}">
                                ${escapeHtml(item.attendance)}
                            </span>
                        </td>
                        <td>${item.guestCount || 1} orang</td>
                        <td>${escapeHtml(message)}</td>
                        <td>${date}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn-icon btn-view" onclick="viewDetail('${item.id}')" title="Lihat Detail">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="btn-icon btn-delete" onclick="deleteItem('${item.id}')" title="Hapus">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Escape HTML to prevent XSS
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Filter by status
        function filterByStatus(status) {
            currentFilter = status;
            filterData();
        }

        // Update active filter tab
        function updateActiveFilterTab() {
            ['filterAll', 'filterHadir', 'filterTidak', 'filterRagu'].forEach(id => {
                const element = document.getElementById(id);
                if (id === 'filterAll' && currentFilter === 'all') {
                    element.classList.add('active');
                } else if (id === 'filterHadir' && currentFilter === 'Hadir') {
                    element.classList.add('active');
                } else if (id === 'filterTidak' && currentFilter === 'Tidak Hadir') {
                    element.classList.add('active');
                } else if (id === 'filterRagu' && currentFilter === 'Ragu') {
                    element.classList.add('active');
                } else {
                    element.classList.remove('active');
                }
            });
        }

        // Handle search input
        document.getElementById('searchInput').addEventListener('input', function(e) {
            currentSearch = e.target.value;
            filterData();
        });

        // View detail
        function viewDetail(id) {
            const item = currentData.find(d => d.id == id);
            if (!item) return;

            const modalBody = document.getElementById('modalBody');
            const date = new Date(item.timestamp).toLocaleString('id-ID', {
                dateStyle: 'full',
                timeStyle: 'long'
            });

            modalBody.innerHTML = `
                <div class="detail-item">
                    <strong>Nama Lengkap</strong>
                    <p>${escapeHtml(item.name) || '-'}</p>
                </div>
                <div class="detail-item">
                    <strong>Email</strong>
                    <p>${escapeHtml(item.email) || '-'}</p>
                </div>
                <div class="detail-item">
                    <strong>Perusahaan</strong>
                    <p>${escapeHtml(item.company) || '-'}</p>
                </div>
                <div class="detail-item">
                    <strong>Nomor Telepon</strong>
                    <p>${escapeHtml(item.phone) || '-'}</p>
                </div>
                <div class="detail-item">
                    <strong>Kehadiran</strong>
                    <p>
                        <span class="attendance-badge ${item.attendance === 'Hadir' ? 'badge-hadir' : item.attendance === 'Tidak Hadir' ? 'badge-tidak' : 'badge-ragu'}">
                            ${escapeHtml(item.attendance)}
                        </span>
                    </p>
                </div>
                <div class="detail-item">
                    <strong>Jumlah Tamu</strong>
                    <p>${item.guestCount || 1} orang</p>
                </div>
                <div class="detail-item">
                    <strong>Pesan / Pertanyaan</strong>
                    <p>${escapeHtml(item.message) || '-'}</p>
                </div>
                <div class="detail-item">
                    <strong>Waktu Daftar</strong>
                    <p>${date}</p>
                </div>
            `;

            document.getElementById('detailModal').classList.add('show');
        }

        // Close modal
        function closeModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        // Delete single item
        function deleteItem(id) {
            if (confirm('Apakah Anda yakin ingin menghapus data ini?')) {
                let rsvps = JSON.parse(localStorage.getItem('rsvps') || '[]');
                rsvps = rsvps.filter(item => item.id != id);
                localStorage.setItem('rsvps', JSON.stringify(rsvps));
                loadData();
            }
        }

        // Clear all data
        function clearAllData() {
            if (confirm('PERINGATAN: Semua data RSVP akan dihapus permanen! Apakah Anda yakin?')) {
                localStorage.removeItem('rsvps');
                loadData();
            }
        }

        // Export to XLS using SheetJS
        function exportToXLS() {
            if (currentData.length === 0) {
                alert('Tidak ada data untuk diekspor');
                return;
            }

            // Prepare data for export
            const exportData = currentData.map((item, index) => ({
                'No': index + 1,
                'Nama Lengkap': item.name || '-',
                'Email': item.email || '-',
                'Perusahaan': item.company || '-',
                'Telepon': item.phone || '-',
                'Kehadiran': item.attendance || '-',
                'Jumlah Tamu': item.guestCount || 1,
                'Pesan': item.message || '-',
                'Waktu Daftar': item.timestamp || '-'
            }));

            // Create worksheet
            const ws = XLSX.utils.json_to_sheet(exportData);

            // Create workbook
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Data RSVP');

            // Generate filename with current date
            const date = new Date();
            const dateStr = date.toISOString().split('T')[0];
            const filename = `rsvp_data_${dateStr}.xlsx`;

            // Export to XLSX file
            XLSX.writeFile(wb, filename);
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Load data on page load
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
